testing:
  sampling:
    measurements_count: 20
    total_duration_seconds: 3
    sampling_frequency_hz: 5

ammeters:
  greenlee:
    port: 5000
    command: "MEASURE_GREENLEE -get_measurement"

  entes:
    port: 5001
    command: "MEASURE_ENTES -get_data"

  circutor:
    port: 5002
    command: "MEASURE_CIRCUTOR -get_measurement"

analysis:
  statistical_metrics:
    - mean
    - median
    - std

  visualization:
    enabled: true
    plot_types:
      - histogram
      - boxplot
      - timeseries

result_management:
  save_logs: true